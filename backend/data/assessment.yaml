# SAFe DevOps self-assessment — pilot content (admin-editable)
# Use | for multiline blocks. Reorder pipeline_areas or practices by moving blocks.

assessment_version: "1.0.0-pilot"

defaults:
  follow_up_cap: 3
  sufficiency_confidence_threshold: 0.72
  low_confidence_flag_threshold: 0.55
  follow_up_fallback_question: |
    Please add more specific detail (tools, cadence, owners, metrics) so the assessment can be scored confidently.

review_prompts:
  sufficiency_system: |
    You are an expert SAFe DevOps assessor for enterprise delivery organizations. Your job is to judge whether a team's
    written self-assessment for ONE practice is specific and evidence-grounded enough to score fairly.
    You must NOT coach the user to game the score. Ask concise follow-ups only when critical details
    are missing. Use the rubric anchors only to inform scoring — do not paste the full rubric to the user.

    When files are attached (images/PDFs), treat them as supporting context. If you cannot read a file,
    say so briefly in evidence_notes and rely on the narrative.

    Respond ONLY with valid JSON matching the provided schema. Never include markdown fences.

  sufficiency_user_template: |
    Pipeline area: {pipeline_area}
    Practice: {practice_name}
    Practice key: {practice_key}

    What this practice evaluates:
    {what_it_evaluates}

    User-facing prompt they answered:
    {user_prompt}

    Team narrative (current):
    {narrative}

    Prior follow-up transcript (if any):
    {follow_up_transcript}

    Rubric anchor summaries (for scoring calibration):
    {rubric_summary}

    Sufficiency confidence threshold (internal): {sufficiency_confidence_threshold}
    Follow-up rounds used so far: {follow_up_rounds_used}
    Follow-up cap: {follow_up_cap}

    Instructions:
    - Set is_sufficient true only if the narrative (plus any readable attachments) gives enough
      concrete detail to assign a fair 1.0–5.0 maturity score with reasonable confidence.
    - confidence is your 0.0–1.0 confidence in your sufficiency decision (not the maturity score).
    - If not sufficient and follow_up_rounds_used < follow_up_cap, provide 1–3 short follow_up_questions.
    - extracted_evidence_notes: short bullets of what evidence appears to be claimed (from text/files).
    - If is_sufficient is true, set internal_score to a decimal between 1.0 and 5.0 using the rubric anchors,
      and score_rationale_summary to 2–4 sentences explaining why. Never mention the numeric score in rationale.
    - If follow_up_rounds_used >= follow_up_cap and you still judge insufficient, set is_sufficient false,
      force_complete true, provisional_internal_score (1.0–5.0 best-effort), provisional_score_rationale_summary,
      and follow_up_questions empty. The app will allow proceed with flags.

rubrics:
  safedevops_default:
    name: SAFe DevOps maturity (pilot)
    anchors:
      - score: 1.0
        name: Initial
        summary: Ad hoc, manual, unclear ownership; limited transparency and repeatability.
      - score: 2.0
        name: Emerging
        summary: Some repeatable practices; gaps in automation, measurement, or cross-team alignment.
      - score: 3.0
        name: Defined
        summary: Clear practices in place for the team; meaningful measurement and collaboration.
      - score: 4.0
        name: Advanced
        summary: Strong automation and feedback loops; proactive quality and operational discipline.
      - score: 5.0
        name: Optimizing
        summary: Systematic learning, predictive operations, continuous improvement embedded in flow.

pipeline_areas:
  - key: continuous_exploration
    name: Continuous Exploration
    order: 1
    practices:
      - key: hypothesize
        name: Hypothesize
        what_it_evaluates: |
          How well the team translates business ideas into clear, measurable hypotheses and MVP-oriented statements.
        enterprise_examples:
          - Formulate and test hypotheses on customer needs with MVPs
          - Measurable outcomes are documented
          - Gather feedback through A/B testing and customer surveys
          - Static testing/feedback loops performed to identify risks early
        user_prompt: |
          Describe how your team turns ideas or requests into clear hypotheses with measurable outcomes.
          Include how you validate assumptions, whether MVPs are used, and how early feedback is gathered.
        evidence_encouragement: |
          Examples: backlog items, hypothesis statements, experiment docs, A/B test screenshots, product metrics screenshots.
        ai_review:
          rubric_ref: safedevops_default
          sufficiency_confidence_threshold: 0.72
          follow_up_cap: 3

      - key: collaborate_research
        name: Collaborate & Research
        what_it_evaluates: |
          How well product, business, technology, and subject-matter experts collaborate to define needs
          and shape what should be built.
        enterprise_examples:
          - Empathy mapping, user interviews, journey mapping
          - Feedback loops like NPS and analytics
          - Quality engineers provide subject matter expertise
          - Assumptions are tested to reduce the risk of building the wrong thing
        user_prompt: |
          Describe how your team collaborates with business, product, architecture, engineering, QA, and other experts
          to understand customer or user needs and shape the work.
        evidence_encouragement: |
          Examples: discovery notes, workshop materials, user research outputs, analytics screenshots, backlog refinement artifacts.
        ai_review:
          rubric_ref: safedevops_default

      - key: architect
        name: Architect
        what_it_evaluates: |
          How well architecture supports continuous delivery, policy compliance, loose coupling, operability,
          and manageable technical debt.
        enterprise_examples:
          - Apply design thinking to support usability and customer-centric solutions
          - Consider testability, especially impacts to automation and performance
          - Architecture is reviewed with dev teams to uncover complexities
        user_prompt: |
          Describe how architecture decisions support continuous delivery for your team. Include maintainability,
          coupling, testability, performance, security, and how teams participate in architecture decisions.
        evidence_encouragement: |
          Examples: architecture diagrams, ADRs, NFR documentation, dependency maps, review notes.
        ai_review:
          rubric_ref: safedevops_default

      - key: synthesize
        name: Synthesize
        what_it_evaluates: |
          How well the team turns exploration outputs into well-formed, prioritized features and backlog items.
        enterprise_examples:
          - Features include benefit hypothesis and measurable outcomes
          - Features are prioritized by customer impact and value using story mapping, backlog refinement, and feature canvases
          - Static testing drives better stories, clearer acceptance criteria, and improved refinement
        user_prompt: |
          Describe how your team turns discovery and exploration into prioritized features or backlog items.
          Include how work is refined, prioritized, and made ready for delivery.
        evidence_encouragement: |
          Examples: feature templates, acceptance criteria, prioritization artifacts, story maps, WSJF or similar evidence.
        ai_review:
          rubric_ref: safedevops_default

  - key: continuous_integration
    name: Continuous Integration
    order: 2
    practices:
      - key: develop
        name: Develop
        what_it_evaluates: |
          How well teams implement stories in vertical slices with sound engineering practices.
        enterprise_examples:
          - Team uses relative estimation to size user stories
          - Devs can run their own local environment easily
          - Unit testing gates run at PR time, including benchmarks and standards
          - Quality engineers engage with devs to shape test scope
          - Commits are linked to Jira in commit messages
          - Security/privacy concerns are discussed during story development
        user_prompt: |
          Describe how your team develops and implements work. Include story sizing, local development setup,
          pull requests, unit testing, code review, and collaboration with QA/security.
        evidence_encouragement: |
          Examples: PR screenshots, branch policy screenshots, local setup docs, unit test reports, code review workflow screenshots.
        ai_review:
          rubric_ref: safedevops_default

      - key: build
        name: Build
        what_it_evaluates: |
          How consistently builds are automated, integrated, and quality-gated.
        enterprise_examples:
          - Automated build at PR time
          - SonarQube, App Scan, differential code coverage standards enforced at build time
          - App scan standards enforced at build time
        user_prompt: |
          Describe how builds are triggered, validated, and governed in your team. Include automation, PR checks,
          quality gates, static analysis, code coverage, and how broken builds are handled.
        evidence_encouragement: |
          Examples: pipeline screenshots, SonarQube screenshots, Snyk/AppScan screenshots, build logs, quality gate settings.
        ai_review:
          rubric_ref: safedevops_default

      - key: test_e2e
        name: Test End-to-End
        what_it_evaluates: |
          How well teams validate functionality in production-like environments with sufficient automation and risk-based testing.
        enterprise_examples:
          - Manual exploratory testing is used early to front-load defects
          - Automated system and regression testing established
          - Risk-based testing is applied
          - Test data management is centralized and standardized
          - DAST testing against live environments
        user_prompt: |
          Describe how your team performs end-to-end, regression, exploratory, integration, and security-related testing.
          Include environment quality, test automation, and test data management.
        evidence_encouragement: |
          Examples: test execution dashboards, regression suite screenshots, DAST screenshots, test plans, environment evidence.
        ai_review:
          rubric_ref: safedevops_default

      - key: stage
        name: Stage
        what_it_evaluates: |
          How well validated features are deployed to production-like staging for final validation before production.
        enterprise_examples:
          - Testing validates the deployment process and mimics the production deployment process
          - UAT is used by the product owner to ensure acceptance criteria are met from their perspective
        user_prompt: |
          Describe how your team stages and validates releases before production. Include production-like environments,
          UAT, deployment validation, and release readiness checks.
        evidence_encouragement: |
          Examples: staging pipeline screenshots, UAT evidence, release validation checklists, environment topology screenshots.
        ai_review:
          rubric_ref: safedevops_default

  - key: continuous_deployment
    name: Continuous Deployment
    order: 3
    practices:
      - key: deploy
        name: Deploy
        what_it_evaluates: |
          How well features are deployed to production independently from release and with controlled visibility.
        enterprise_examples:
          - Deployments through UCD or a supported ADO pipeline
          - Deployment data is recorded automatically in Jira for metrics
          - Feature toggles or versioning are in place to enable dark releases
          - Stage quality gates are verified
        user_prompt: |
          Describe how your team deploys to production. Include deployment automation, release/deployment separation,
          feature flags, deployment approvals, and deployment telemetry.
        evidence_encouragement: |
          Examples: deployment pipeline screenshots, release logs, feature flag screenshots, deployment history, change records.
        ai_review:
          rubric_ref: safedevops_default

      - key: verify
        name: Verify
        what_it_evaluates: |
          How well teams verify deployment success, detect failures, and recover safely.
        enterprise_examples:
          - Periodic pen tests from IT Security
          - Deployment verification feeds metrics like change failure rate
          - Automated production validation performed
        user_prompt: |
          Describe how your team verifies that deployments succeeded and how issues are detected, rolled back, or fixed forward.
        evidence_encouragement: |
          Examples: smoke test evidence, post-deploy validation dashboards, rollback procedures, synthetic tests, validation reports.
        ai_review:
          rubric_ref: safedevops_default

      - key: monitor
        name: Monitor
        what_it_evaluates: |
          How well teams collect and use telemetry across the solution stack to understand health, performance,
          incidents, and value.
        enterprise_examples:
          - Logs go to Graylog and relevant team members have access
          - Log review drives upstream quality/process changes
          - Teams continuously evaluate monitoring needs
          - SolarWinds and Dynatrace agents collect metrics
          - Monitoring covers third-party and cloud platforms where applicable
          - Automated actions for restart/file cleanup/incident creation/root cause
          - On-prem apps track exceptions, errors, slowdowns, user experience
          - Dashboards provide real-time insights
          - APIs are monitored with health checks and log analysis
        user_prompt: |
          Describe how your team monitors production behavior, reliability, user experience, logs, metrics, dashboards, and alerts.
          Include how monitoring is used to improve delivery and operations.
        evidence_encouragement: |
          Examples: Dynatrace screenshots, dashboard screenshots, log dashboards, alert rules, API health dashboards.
        ai_review:
          rubric_ref: safedevops_default

      - key: respond
        name: Respond
        what_it_evaluates: |
          How well teams detect, troubleshoot, and resolve production issues proactively and collaboratively.
        enterprise_examples:
          - ITSM processes are followed for incident management and trustworthy metrics are generated
          - Incidents are raised appropriately even when not discovered by the end user
          - Quality engineers provide expertise to recreate and troubleshoot incidents and apply automation where possible
        user_prompt: |
          Describe how your team responds to incidents and production issues. Include detection, triage, collaboration
          between Dev and Ops, RCA, automation, and recovery practices.
        evidence_encouragement: |
          Examples: incident reports, ServiceNow screenshots, RCA docs, on-call procedures, incident metrics dashboards.
        ai_review:
          rubric_ref: safedevops_default

  - key: release_on_demand
    name: Release on Demand
    order: 4
    practices:
      - key: release
        name: Release
        what_it_evaluates: |
          How well deployed features can be made available to end users on demand.
        enterprise_examples:
          - Automated production testing that validates toggled functionality
          - Release on Demand
        user_prompt: |
          Describe how your team releases functionality to users once it is deployed. Include feature flags, phased rollout,
          blue/green or canary concepts if applicable, and business-controlled release readiness.
        evidence_encouragement: |
          Examples: feature flag evidence, release process evidence, rollout screenshots, launch controls, production validation evidence.
        ai_review:
          rubric_ref: safedevops_default

      - key: stabilize
        name: Stabilize
        what_it_evaluates: |
          How well the production environment remains stable, reliable, secure, and recoverable.
        enterprise_examples:
          - Change failure rate is measured and monitored
          - Retrospectives are regularly performed to seek quality improvement opportunities
          - Quality metrics like service availability time are documented and met
          - Automated recovery from outages
        user_prompt: |
          Describe how your team ensures production stability after release. Include resiliency, outage recovery, availability,
          retrospectives, change failure tracking, and service quality measures.
        evidence_encouragement: |
          Examples: SLA/SLO dashboards, incident trend reports, retro outputs, availability reports, DR evidence.
        ai_review:
          rubric_ref: safedevops_default

      - key: measure
        name: Measure
        what_it_evaluates: |
          How well the team collects factual information about the value delivered and compares it against intended outcomes.
        enterprise_examples: []
        user_prompt: |
          Describe how your team measures whether delivered work created the intended business or user value. Include operational
          metrics, customer feedback, product metrics, and feature-level outcomes.
        evidence_encouragement: |
          Examples: KPI dashboards, analytics screenshots, adoption reports, experiment results, feedback summaries.
        ai_review:
          rubric_ref: safedevops_default

      - key: learn
        name: Learn
        what_it_evaluates: |
          How well the team uses outcomes and empirical feedback to make pivot-or-persevere decisions and improve.
        enterprise_examples:
          - Team provides input into the effort/value ratio and what that means for next time
          - Retrospectives are performed regularly to assess how to handle similar work in the future based on value
        user_prompt: |
          Describe how your team learns from delivered work and uses those learnings to change future decisions, priorities,
          engineering practices, or release behavior.
        evidence_encouragement: |
          Examples: retrospectives, post-implementation reviews, lessons learned, pivot/persevere decisions, improvement backlog items.
        ai_review:
          rubric_ref: safedevops_default
