# Railway config-as-code (repo root). Using Dockerfile avoids Railpack failing on monorepo layout.
# Dashboard: you can still set Root Directory to "backend" and remove this + Dockerfile if you prefer Railpack on Python only.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "Dockerfile", "railway.toml"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
