# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot-yml-file
version: 2

updates:
  # React / Vite app
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
    groups:
      vite-ecosystem:
        patterns:
          - "@vitejs/*"
          - "vite"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      typescript-eslint:
        patterns:
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "typescript"

  # FastAPI / Uvicorn stack
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/New_York
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
    # requirements.txt uses compatible release specifiers; Dependabot opens PRs when newer versions match

  # Root Dockerfile (node AS frontend, python runtime)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"

  # Bumps action versions when you add workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
