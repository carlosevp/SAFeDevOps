# SonarCloud — used with Automatic Analysis (GitHub). Do not also run sonarqube-scan-action in CI.

sonar.projectKey=carlosevp_SAFeDevOps
sonar.organization=carlosevp

sonar.host.url=https://sonarcloud.io

sonar.sources=backend/app,frontend/src
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/dist/**,**/spa_dist/**,**/.venv/**,\
  **/package-lock.json,**/SAFeDetails.txt,**/data/*.yaml,**/assessment*.yaml

sonar.python.version=3.12
