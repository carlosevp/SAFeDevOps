<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Continuous Delivery Pipeline — four aspects</title>
  <desc id="desc">Original diagram: four connected stages from exploration through release on demand.</desc>
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4976"/>
      <stop offset="100%" style="stop-color:#153a5c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="220" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">SAFe Continuous Delivery Pipeline (conceptual)</text>
  <text x="480" y="58" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#64748b">Ideation ? build &amp; validate ? production flow ? business-controlled value release</text>
  <g filter="url(#shadow)">
    <rect x="40" y="88" width="190" height="100" rx="10" fill="url(#boxGrad)"/>
    <text x="135" y="125" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Continuous</text>
    <text x="135" y="145" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Exploration</text>
    <text x="135" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#cbd5e1">Discover &amp; define value</text>
  </g>
  <path d="M 235 138 L 275 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="280" y="88" width="190" height="100" rx="10" fill="url(#boxGrad)"/>
    <text x="375" y="125" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Continuous</text>
    <text x="375" y="145" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Integration</text>
    <text x="375" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#cbd5e1">Build, integrate, test</text>
  </g>
  <path d="M 475 138 L 515 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="520" y="88" width="190" height="100" rx="10" fill="url(#boxGrad)"/>
    <text x="615" y="125" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Continuous</text>
    <text x="615" y="145" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Deployment</text>
    <text x="615" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#cbd5e1">Prod path, verify, operate</text>
  </g>
  <path d="M 715 138 L 755 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="760" y="88" width="160" height="100" rx="10" fill="#0f766e"/>
    <text x="840" y="125" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Release on</text>
    <text x="840" y="145" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">Demand</text>
    <text x="840" y="172" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#ccfbf1">Expose value when ready</text>
  </g>
  <text x="480" y="208" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#94a3b8">Illustrative only — not an official SAFe figure. Align taxonomy with your organization and SAFe guidance.</text>
</svg>
