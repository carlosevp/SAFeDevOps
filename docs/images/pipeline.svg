<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="ptitle pdesc">
  <title id="ptitle">Continuous Delivery Pipeline - four aspects</title>
  <desc id="pdesc">Four connected stages: Continuous Exploration through Release on Demand.</desc>
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e4976"/>
      <stop offset="1" stop-color="#153a5c"/>
    </linearGradient>
    <marker id="pm" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="220" fill="#f8fafc"/>
  <text x="480" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#0f172a">SAFe Continuous Delivery Pipeline (conceptual)</text>
  <text x="480" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">Ideation to build and validate to production flow to business-controlled value release</text>
  <g stroke="#1e3a5f" stroke-width="1" fill="url(#pg)">
    <rect x="40" y="88" width="190" height="100" rx="10"/>
    <rect x="280" y="88" width="190" height="100" rx="10"/>
    <rect x="520" y="88" width="190" height="100" rx="10"/>
  </g>
  <rect x="760" y="88" width="160" height="100" rx="10" fill="#0f766e" stroke="#0d5c56" stroke-width="1"/>
  <text x="135" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Continuous</text>
  <text x="135" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Exploration</text>
  <text x="135" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#cbd5e1">Discover and define value</text>
  <text x="375" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Continuous</text>
  <text x="375" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Integration</text>
  <text x="375" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#cbd5e1">Build, integrate, test</text>
  <text x="615" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Continuous</text>
  <text x="615" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Deployment</text>
  <text x="615" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#cbd5e1">Prod path, verify, operate</text>
  <text x="840" y="125" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Release on</text>
  <text x="840" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Demand</text>
  <text x="840" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ccfbf1">Expose value when ready</text>
  <path d="M 235 138 L 268 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#pm)"/>
  <path d="M 475 138 L 508 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#pm)"/>
  <path d="M 715 138 L 748 138" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#pm)"/>
  <text x="480" y="208" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#94a3b8">Illustrative only - not an official SAFe figure.</text>
</svg>
